<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Newshash{% endblock %}</title>
  <!-- Apply stored theme before first paint to avoid flash -->
  <script>
    (function () {
      var t = localStorage.getItem('theme');
      if (t === 'light' || t === 'dark') document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Light mode (default) ── */
    :root {
      --bg:        #f3f4f6;
      --surface:   #ffffff;
      --border:    #e5e7eb;
      --text:      #111827;
      --muted:     #6b7280;

      --summary-bg:     #eff6ff;
      --summary-border: #bfdbfe;
      --summary-text:   #1e3a5f;
      --summary-label:  #1d4ed8;

      --banner-bg:     #fef3c7;
      --banner-border: #fde68a;
      --banner-text:   #92400e;

      --left:        #1d4ed8;
      --centre-left: #6d28d9;
      --centre:      #374151;
      --centre-right:#b45309;
      --right:       #b91c1c;
    }

    /* ── Dark mode: system preference ── */
    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) {
        --bg:        #111827;
        --surface:   #1f2937;
        --border:    #374151;
        --text:      #f9fafb;
        --muted:     #9ca3af;

        --summary-bg:     #1e3a5f;
        --summary-border: #1d4ed8;
        --summary-text:   #bfdbfe;
        --summary-label:  #60a5fa;

        --banner-bg:     #451a03;
        --banner-border: #78350f;
        --banner-text:   #fcd34d;

        --centre: #9ca3af;
      }
    }

    /* ── Dark mode: user override ── */
    :root[data-theme="dark"] {
      --bg:        #111827;
      --surface:   #1f2937;
      --border:    #374151;
      --text:      #f9fafb;
      --muted:     #9ca3af;

      --summary-bg:     #1e3a5f;
      --summary-border: #1d4ed8;
      --summary-text:   #bfdbfe;
      --summary-label:  #60a5fa;

      --banner-bg:     #451a03;
      --banner-border: #78350f;
      --banner-text:   #fcd34d;

      --centre: #9ca3af;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      transition: background 0.15s, color 0.15s;
    }

    a { color: inherit; text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* Header stays dark in both modes */
    header {
      background: #111827;
      color: #fff;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      gap: 1.5rem;
      flex-wrap: wrap;
    }
    header .brand {
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: -0.5px;
    }
    header .brand a { color: #fff; }
    header .tagline {
      font-size: 0.8rem;
      color: #9ca3af;
    }
    header .archive-nav {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      flex-wrap: wrap;
    }
    header .archive-nav span {
      font-size: 0.75rem;
      color: #6b7280;
    }
    header .archive-nav a {
      font-size: 0.75rem;
      color: #9ca3af;
      padding: 0.2em 0.5em;
      border-radius: 4px;
    }
    header .archive-nav a:hover { background: #374151; text-decoration: none; color: #fff; }
    header .archive-nav a.active { background: #374151; color: #fff; }

    /* Theme toggle */
    .theme-toggle {
      margin-left: auto;
      background: none;
      border: 1px solid #374151;
      color: #9ca3af;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 0.25em 0.65em;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
    }
    .theme-toggle:hover { background: #374151; color: #fff; }

    .archive-banner {
      background: var(--banner-bg);
      border: 1px solid var(--banner-border);
      border-radius: 8px;
      padding: 0.6rem 1rem;
      margin-bottom: 1.5rem;
      font-size: 0.85rem;
      color: var(--banner-text);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .archive-banner a { color: var(--banner-text); font-weight: 600; text-decoration: underline; }

    main { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem; }

    /* lean colours */
    .lean-left        { --lean-color: var(--left); }
    .lean-centre-left { --lean-color: var(--centre-left); }
    .lean-centre      { --lean-color: var(--centre); }
    .lean-centre-right{ --lean-color: var(--centre-right); }
    .lean-right       { --lean-color: var(--right); }

    .lean-badge {
      display: inline-block;
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 0.15em 0.5em;
      border-radius: 999px;
      background: color-mix(in srgb, var(--lean-color) 12%, transparent);
      color: var(--lean-color);
      border: 1px solid color-mix(in srgb, var(--lean-color) 30%, transparent);
    }

    .lean-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--lean-color);
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <header>
    <div class="brand"><a href="/">Newshash</a></div>
    {% if generated_at %}
    <div class="tagline">{{ generated_at }}</div>
    {% endif %}
    {% if available_dates and available_dates | length > 1 %}
    <nav class="archive-nav">
      <span>Archive:</span>
      {% for d in available_dates %}
      <a href="/?archive_date={{ d }}"
         class="{{ 'active' if d == (viewing_date or today) else '' }}">
        {{ d }}
      </a>
      {% endfor %}
    </nav>
    {% endif %}
    <button class="theme-toggle" id="theme-toggle" onclick="cycleTheme()">Auto</button>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <script>
    var labels = { auto: 'Auto', light: 'Light', dark: 'Dark' };
    var btn = document.getElementById('theme-toggle');

    function currentTheme() {
      return localStorage.getItem('theme') || 'auto';
    }

    function applyTheme(t) {
      if (t === 'auto') {
        localStorage.removeItem('theme');
        document.documentElement.removeAttribute('data-theme');
      } else {
        localStorage.setItem('theme', t);
        document.documentElement.setAttribute('data-theme', t);
      }
      btn.textContent = labels[t];
    }

    function cycleTheme() {
      var order = ['auto', 'light', 'dark'];
      var next = order[(order.indexOf(currentTheme()) + 1) % order.length];
      applyTheme(next);
    }

    // Set button label on load
    btn.textContent = labels[currentTheme()];
  </script>
</body>
</html>
