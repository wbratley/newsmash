<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Newsmash{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f3f4f6;
      --surface:   #ffffff;
      --border:    #e5e7eb;
      --text:      #111827;
      --muted:     #6b7280;
      --accent:    #111827;

      --left:        #1d4ed8;
      --centre-left: #6d28d9;
      --centre:      #374151;
      --centre-right:#b45309;
      --right:       #b91c1c;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    a { color: inherit; text-decoration: none; }
    a:hover { text-decoration: underline; }

    header {
      background: var(--text);
      color: #fff;
      padding: 1rem 2rem;
      display: flex;
      align-items: baseline;
      gap: 1.5rem;
    }
    header .brand {
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: #fff;
    }
    header .brand a { color: #fff; }
    header .tagline {
      font-size: 0.8rem;
      color: #9ca3af;
    }
    header .archive-nav {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      flex-wrap: wrap;
    }
    header .archive-nav span {
      font-size: 0.75rem;
      color: #6b7280;
    }
    header .archive-nav a {
      font-size: 0.75rem;
      color: #9ca3af;
      padding: 0.2em 0.5em;
      border-radius: 4px;
    }
    header .archive-nav a:hover { background: #374151; text-decoration: none; color: #fff; }
    header .archive-nav a.active { background: #374151; color: #fff; }

    .archive-banner {
      background: #fef3c7;
      border: 1px solid #fde68a;
      border-radius: 8px;
      padding: 0.6rem 1rem;
      margin-bottom: 1.5rem;
      font-size: 0.85rem;
      color: #92400e;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .archive-banner a { color: #92400e; font-weight: 600; text-decoration: underline; }

    main { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem; }

    /* lean colours as CSS classes */
    .lean-left        { --lean-color: var(--left); }
    .lean-centre-left { --lean-color: var(--centre-left); }
    .lean-centre      { --lean-color: var(--centre); }
    .lean-centre-right{ --lean-color: var(--centre-right); }
    .lean-right       { --lean-color: var(--right); }

    .lean-badge {
      display: inline-block;
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 0.15em 0.5em;
      border-radius: 999px;
      background: color-mix(in srgb, var(--lean-color) 12%, transparent);
      color: var(--lean-color);
      border: 1px solid color-mix(in srgb, var(--lean-color) 30%, transparent);
    }

    .lean-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--lean-color);
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <header>
    <div class="brand"><a href="/">Newsmash</a></div>
    {% if generated_at %}
    <div class="tagline">{{ generated_at }}</div>
    {% endif %}
    {% if available_dates and available_dates | length > 1 %}
    <nav class="archive-nav">
      <span>Archive:</span>
      {% for d in available_dates %}
      <a href="/?archive_date={{ d }}"
         class="{{ 'active' if d == (viewing_date or today) else '' }}">
        {{ d }}
      </a>
      {% endfor %}
    </nav>
    {% endif %}
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
